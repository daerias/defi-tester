<!doctype html>
<html lang="de" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="STK Defi Tester — Defibrillator-Schockenergie Toleranzprüfung für Medizintechniker. Schnelle PASS/FAIL-Ergebnisse nach IEC 60601-2-4." />
    <meta property="og:title" content="STK Defi Tester" />
    <meta property="og:description" content="Defibrillator-Schockenergie Toleranzprüfung — mobil, schnell, präzise." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="STK Defi Tester" />
    <meta name="twitter:description" content="Defibrillator-Toleranzprüfung nach IEC 60601-2-4." />
    <link rel="canonical" href="https://stk-defi-tester.pages.dev/" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>STK Defi Tester</title>
    <script>
      // Prevent FOUC: apply saved theme before paint
      (function() {
        try {
          var t = localStorage.getItem('stk-defi-theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {}
      })();
    </script>
    <style>
      /* Prevent FOUC — apply dark theme instantly before JS loads */
      html[data-theme="dark"] body { background-color: #0d1117; color: #e0e6ed; }
      html[data-theme="light"] body { background-color: #e8ecf1; color: #1a1a2e; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
